<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Energy Login</title> 

  <!--Google font-->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style-auth.css">
</head>  
<body>
    <section class="auth-section">
        <div class="auth-card">
            <form action="dashboard.html" method="post">
                <div class="logo">
                    <img src="images/logo.png" alt="Smart Energy logo">
                    <p>Smart Energy</p>
                </div>
                <h1>Welcome back</h1>
                <p class="subtitle">Please enter your details</p>
                <div class="formrow">
                    <div class="formel">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                </div>
                <div class="formrow">
                    <div class="formel">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>
                <div class="formrow">
                    <button type="submit">Sign in</button>
                </div>
                <div class="signup-link">
                    <p>Don't have an account?<a href="pages/signup.html">Sign up</a></p>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
