<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Energy — Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/all.min.css" />
</head>
<body>
  <section class="auth-section">
    <div class="auth-card">
      <div class="logo">
        <div class="bolt"></div>
        Smart Energy
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>
      <div class="formrow">
        <div class="formel">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="you@email.com" />
        </div>
      </div>
      <div class="formrow">
        <div class="formel">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" />
        </div>
      </div>
      <a class="btn-primary" href="pages/dashboard.html">Sign in</a>
      <p class="signup-link">No account? <a href="pages/signup-1.html">Sign up</a></p>
    </div>
  </section>
</body>
</html>
