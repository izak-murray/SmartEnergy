<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Energy — Sign In</title>
  <!-- Main stylesheet — note path difference: index.html sits in root, not /pages/ -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">

  <header class="site-header"></header>

  <!-- ── SIGN IN CARD ────────────────────────────────────────
       Centred auth layout using .auth-section flexbox.
       Form action navigates directly to dashboard on submit.
  ──────────────────────────────────────────────────────────── -->
  <section class="auth-section">
    <div class="auth-card">
      <form action="./pages/dashboard.html">

        <!-- Logo lockup — icon + wordmark -->
        <div class="logo">
          <img src="images/logo.png" alt="Smart Energy logo">
          <p>Smart Energy</p>
        </div>

        <h1>Welcome back</h1>
        <p class="subtitle">Please enter your details</p>

        <!-- Email field ──────────────────────────────────────
             pattern allows "admin" shortcut for demo purposes,
             otherwise enforces standard email format.
        ──────────────────────────────────────────────────── -->
        <div class="formrow">
          <div class="formel">
            <label for="email">Email Address</label>
            <input type="text" id="email" name="email" placeholder="example@email.com"
              pattern="admin|.+@.+\..+" required>
          </div>
        </div>

        <!-- Password field ───────────────────────────────────
             pattern allows "admin" shortcut for demo purposes,
             otherwise requires minimum 6 characters.
        ──────────────────────────────────────────────────── -->
        <div class="formrow">
          <div class="formel">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password"
              pattern="admin|.{6,}" required>
          </div>
        </div>

        <!-- Remember me + forgot password row -->
        <div class="formrow login-options">
          <label class="remember-me">
            <input type="checkbox">remember for 30 days
          </label>
          <!-- Placeholder link — would trigger password reset flow in production -->
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <!-- Submit button — triggers HTML5 form validation before navigating -->
        <div class="formrow">
          <button class="btn-primary">Sign in</button>
        </div>

        <!-- Link to sign-up flow -->
        <div class="signup-link">
          <p>Don't have an account?<a href="./pages/signup-1.html">Sign up</a></p>
        </div>

      </form>
    </div>
  </section>

  <footer class="site-footer">
    <a href="faq.html">Help &amp; FAQ</a>
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
  </footer>

</body>
</html>
