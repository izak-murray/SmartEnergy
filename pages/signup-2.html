<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Energy — Your Household</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="auth-section">
    <div class="auth-card">
      <div class="logo"><div class="bolt"></div>Smart Energy</div>
      <div class="step-indicator">
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>
      <h1>Your household</h1>
      <p class="subtitle">Step 2 of 3 — Personalise your dashboard</p>
      <div class="formrow">
        <div class="formel">
          <label for="suburb">Suburb / postcode</label>
          <input id="suburb" type="text" placeholder="e.g. Spring Hill 4000" />
        </div>
      </div>
      <div class="formrow">
        <div class="formel">
          <label for="htype">Household type</label>
          <select id="htype">
            <option value="">Select...</option>
            <option>Renter — apartment</option>
            <option>Renter — house</option>
            <option>Homeowner</option>
          </select>
        </div>
      </div>
      <div class="formrow">
        <div class="formel">
          <label for="occupants">Number of occupants</label>
          <select id="occupants">
            <option value="">Select...</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5+</option>
          </select>
        </div>
      </div>
      <div class="formrow">
        <div class="formel">
          <label for="goal">Energy goal</label>
          <select id="goal">
            <option value="">Select...</option>
            <option>Reduce my bills</option>
            <option>Reduce environmental impact</option>
            <option>Both</option>
          </select>
        </div>
      </div>
      <div class="formrow">
        <div class="formel">
          <label for="solar">Solar panels (homeowners)</label>
          <select id="solar">
            <option>No solar panels</option>
            <option>Yes — small system (1–3 kW)</option>
            <option>Yes — medium system (3–6 kW)</option>
            <option>Yes — large system (6+ kW)</option>
          </select>
        </div>
      </div>
      <a class="btn-primary" href="signup-3.html">Continue</a>
    </div>
  </section>
</body>
</html>
