<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Energy Sign Up</title> 

  <link rel="stylesheet" href="../css/style.css">
</head>  

<body class="auth-body">
    <header class="site-header"></header>
    <section class="auth-section">
        <div class="auth-card">
            <form action="signup-3.html" method="post">
                <div class="logo">
                    <img src="../images/logo.png" alt="Smart Energy logo">
                    <p>Smart Energy</p>
                </div>
                <div class="step-indicator">
                    <div class="step-dot done"></div>
                    <div class="step-dot active"></div>
                    <div class="step-dot"></div>
                </div>
                <h1>Your household</h1>
                <p class="subtitle">Step 2 of 3 — Personalise your dashboard</p>
                <div class="formrow">
                    <div class="formel">
                        <label for="suburb">Suburb / postcode</label>
                        <input type="text" id="suburb" name="suburb" placeholder="e.g. Spring Hill 4000" required>
                    </div>
                </div>
                <div class="formrow">
                    <div class="formel">
                        <label for="htype">Household type</label>
                        <select id="htype" name="htype" required>
                            <option value="">Select...</option>
                            <option>Renter — apartment</option>
                            <option>Renter — house</option>
                            <option>Homeowner</option>
                        </select>
                    </div>
                </div>
                <div class="formrow">
                    <div class="formel">
                        <label for="occupants">Number of occupants</label>
                        <select id="occupants" name="occupants" required>
                            <option value="">Select...</option>
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5+</option>
                        </select>
                    </div>
                </div>
                <div class="formrow">
                    <div class="formel">
                        <label for="goal">Energy goal</label>
                        <select id="goal" name="goal" required>
                            <option value="">Select...</option>
                            <option>Reduce my bills</option>
                            <option>Reduce environmental impact</option>
                            <option>Both</option>
                        </select>
                    </div>
                </div>
                <div class="formrow">
                    <div class="formel">
                        <label for="solar">Solar panels (homeowners)</label>
                        <select id="solar" name="solar" required>
                            <option value="">Select...</option>
                            <option>No solar panels</option>
                            <option>Yes — small system (1-3 kW)</option>
                            <option>Yes — medium system (3-6 kW)</option>
                            <option>Yes — large system (6+ kW)</option>
                        </select>
                    </div>
                </div>
                <div class="formrow two-button-row">
                    <a class="btn-secondary" href="signup-1.html">Previous</a>
                    <a class="btn-primary" href="signup-3.html">Continue</a>
                </div>
            </form>
        </div>
    </section>
    <footer class="site-footer">
        <a href="faq.html">Help &amp; FAQ</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
    </footer>
</body>
</html>
