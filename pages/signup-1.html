<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Energy — Create Account</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="auth-section">
    <div class="auth-card">
      <div class="logo"><div class="bolt"></div>Smart Energy</div>
      <div class="step-indicator">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
        <div class="step-dot"></div>
      </div>
      <h1>Create your account</h1>
      <p class="subtitle">Step 1 of 3 — Your details</p>
      <div class="formrow">
        <div class="formel">
          <label for="name">Full name</label>
          <input id="name" type="text" placeholder="e.g. Elise Monroe" />
        </div>
      </div>
      <div class="formrow">
        <div class="formel">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="you@email.com" />
        </div>
      </div>
      <div class="formrow">
        <div class="formel">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Create a password" />
        </div>
      </div>
      <a class="btn-primary" href="signup-2.html">Continue</a>
      <p class="signup-link">Already have an account? <a href="../index.html">Sign in</a></p>
    </div>
  </section>
</body>
</html>
