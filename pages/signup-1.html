<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Energy Sign Up</title> 

  <link rel="stylesheet" href="../css/style.css">
</head>  

<body class="auth-body">
    <header class="site-header"></header>
    <section class="auth-section">
        <div class="auth-card">
            <form action="dashboard.html" method="post">
                <div class="logo">
                    <img src="../images/logo.png" alt="Smart Energy logo">
                    <p>Smart Energy</p>
                </div>
                <div class="step-indicator">
                    <div class="step-dot active"></div>
                    <div class="step-dot"></div>
                    <div class="step-dot"></div>
                </div>
                <h1>Create your account</h1>
                <p class="subtitle">Step 1 of 3 — Your details</p>
                <div class="formrow">
                    <div class="formel">
                        <label for="fullname">Full name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="e.g. Elise Monroe" required>
                    </div>
                </div>
                <div class="formrow">
                    <div class="formel">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                </div>
                <div class="formrow">
                    <div class="formel">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required>
                    </div>
                </div>
                <div class="formrow">
                    <a class="btn-primary" href="signup-2.html">Continue</a>
                </div>
                <div class="signup-link">
                    <p>Already have an account?<a href="../index.html">Sign in</a></p>
                </div>
            </form>
        </div>
    </section>
    <footer class="site-footer">
        <a href="faq.html">Help &amp; FAQ</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
    </footer>
</body>
</html>
