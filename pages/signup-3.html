<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Energy — Your Appliances</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <section class="auth-section">
    <div class="auth-card wide">
      <div class="logo"><div class="bolt"></div>Smart Energy</div>
      <div class="step-indicator">
        <div class="step-dot done"></div>
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
      </div>
      <h1>Your appliances</h1>
      <p class="subtitle">Step 3 of 3 — Select everything in your home</p>
      <div class="appliance-grid">
        <input class="app-cb" type="checkbox" id="a1" /><label class="appliance-toggle" for="a1"><span class="app-emoji">❄️</span>Air conditioning</label>
        <input class="app-cb" type="checkbox" id="a2" /><label class="appliance-toggle" for="a2"><span class="app-emoji">🧊</span>Fridge / freezer</label>
        <input class="app-cb" type="checkbox" id="a3" /><label class="appliance-toggle" for="a3"><span class="app-emoji">🫧</span>Washing machine</label>
        <input class="app-cb" type="checkbox" id="a4" /><label class="appliance-toggle" for="a4"><span class="app-emoji">🌀</span>Dryer</label>
        <input class="app-cb" type="checkbox" id="a5" /><label class="appliance-toggle" for="a5"><span class="app-emoji">🚿</span>Hot water system</label>
        <input class="app-cb" type="checkbox" id="a6" /><label class="appliance-toggle" for="a6"><span class="app-emoji">🍽️</span>Dishwasher</label>
        <input class="app-cb" type="checkbox" id="a7" /><label class="appliance-toggle" for="a7"><span class="app-emoji">📺</span>TV / entertainment</label>
        <input class="app-cb" type="checkbox" id="a8" /><label class="appliance-toggle" for="a8"><span class="app-emoji">💡</span>Lighting</label>
      </div>
      <a class="btn-primary" href="dashboard.html" style="margin-top:14px;">Build my dashboard →</a>
    </div>
  </section>
</body>
</html>
