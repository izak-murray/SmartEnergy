<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Energy Sign Up</title> 
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
</head>  

<body>
    <section class="auth-section">
        <div class="auth-card wide">
            <form action="dashboard.html" method="post">
                <div class="logo">
                    <img src="images/logo.png" alt="Smart Energy logo">
                    <p>Smart Energy</p>
                </div>
                <div class="step-indicator">
                    <div class="step-dot done"></div>
                    <div class="step-dot done"></div>
                    <div class="step-dot active"></div>
                </div>
                <h1>Your appliances</h1>
                <p class="subtitle">Step 3 of 3 — Select everything in your home</p>
                <div class="appliance-grid">
                    <input class="app-cb" type="checkbox" id="a1" name="appliances" value="air-conditioning">
                    <label class="appliance-toggle" for="a1"><i class="ph ph-snowflake"></i>Air conditioning</label>

                    <input class="app-cb" type="checkbox" id="a2" name="appliances" value="fridge-freezer">
                    <label class="appliance-toggle" for="a2"><i class="ph ph-thermometer"></i>Fridge / freezer</label>

                    <input class="app-cb" type="checkbox" id="a3" name="appliances" value="washing-machine">
                    <label class="appliance-toggle" for="a3"><i class="ph ph-washing-machine"></i>Washing machine</label>

                    <input class="app-cb" type="checkbox" id="a4" name="appliances" value="dryer">
                    <label class="appliance-toggle" for="a4"><i class="ph ph-fan"></i>Dryer</label>

                    <input class="app-cb" type="checkbox" id="a5" name="appliances" value="hot-water-system">
                    <label class="appliance-toggle" for="a5"><i class="ph ph-shower"></i>Hot water system</label>

                    <input class="app-cb" type="checkbox" id="a6" name="appliances" value="dishwasher">
                    <label class="appliance-toggle" for="a6"><i class="ph ph-fork-knife"></i>Dishwasher</label>

                    <input class="app-cb" type="checkbox" id="a7" name="appliances" value="tv-entertainment">
                    <label class="appliance-toggle" for="a7"><i class="ph ph-television"></i>TV / entertainment</label>

                    <input class="app-cb" type="checkbox" id="a8" name="appliances" value="lighting">
                    <label class="appliance-toggle" for="a8"><i class="ph ph-lightbulb"></i>Lighting</label>
                </div>
                <div class="formrow">
                    <a class="btn-primary" href="dashboard.html">Build my dashboard →</a>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
